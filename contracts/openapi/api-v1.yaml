openapi: "3.0.3"

info:
  title: Corporate RAG — Frontend API
  version: "1.0.0"
  description: |
    Frontend-facing REST API Java Spring Backend. Единственный API, доступный
    браузеру через nginx-прокси. Все RAG-запросы идут через этот API; Python
    AI Service напрямую недоступен.

    **Аутентификация:** JWT в httpOnly cookie `corp_rag_session`. Cookie
    устанавливается через `POST /auth/login`, валидируется на каждом защищённом
    endpoint, удаляется через `POST /auth/logout`.

    **Авторизация:** RBAC. У каждого endpoint указаны требуемые permissions
    (см. `x-required-permissions` extension).

    **HATEOAS:** Ответы содержат `_links` для дискаверабильности. Frontend SPA
    может строить навигацию по этим ссылкам.

    **Контракт-First Pattern:** этот файл написан до реализации. Frontend и
    Java генерируют DTO/типы из этой схемы. Breaking changes требуют ADR.

    **Связи с другими контрактами:**
    - `contracts/openapi/ai-service-v1.yaml` — internal Java↔Python API
    - `contracts/asyncapi/events-v1.yaml` — RabbitMQ события
    - `contracts/constants.yaml` — error_codes для ProblemDetail.errorCode
  contact:
    name: Corporate RAG Team
  license:
    name: Internal

servers:
  - url: http://localhost:8080/api/v1
    description: Локальный Java backend через Docker Compose
  - url: http://localhost/api/v1
    description: Через nginx-прокси (порт 80)

tags:
  - name: root
    description: Точка входа API с HATEOAS
  - name: auth
    description: Аутентификация (login / logout / me)
  - name: users
    description: Управление пользователями (admin)
  - name: roles
    description: Управление ролями и правами (admin)
  - name: access-policies
    description: Политики доступа к документам (admin)
  - name: documents
    description: Загрузка, листинг, удаление документов
  - name: chat-conversations
    description: Диалоги пользователя
  - name: chat-messages
    description: Сообщения внутри диалога
  - name: chat-query
    description: Главный RAG-endpoint

paths:
  # ===========================================================================
  # Root
  # ===========================================================================
  /:
    get:
      operationId: getApiRoot
      tags: [root]
      summary: Точка входа API с HATEOAS-навигацией
      description: Возвращает список доступных ресурсов API через `_links`. Не требует аутентификации.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiRoot'
              example:
                apiVersion: "1.0.0"
                _links:
                  self: { href: "/api/v1/" }
                  login: { href: "/api/v1/auth/login" }
                  me: { href: "/api/v1/me" }
                  documents: { href: "/api/v1/documents" }
                  conversations: { href: "/api/v1/chat/conversations" }

  # ===========================================================================
  # Auth
  # ===========================================================================
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Войти и установить session cookie
      description: |
        При успехе устанавливает httpOnly cookie `corp_rag_session`.
        При успехе устанавливает две httpOnly cookie:
        - `corp_rag_session`: `HttpOnly`, `Secure` (по профилю), `SameSite=Strict`,
          `Path=/api/v1`, TTL 15 минут.
        - `corp_rag_refresh`: `HttpOnly`, `Secure` (по профилю), `SameSite=Strict`,
          `Path=/api/v1/auth`, opaque refresh token с серверной ротацией.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "ivanov"
              password: "supersecret"
      responses:
        '200':
          description: Успешный вход
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "corp_rag_session=eyJhbGc...; HttpOnly; Secure; SameSite=Strict; Path=/api/v1; Max-Age=900"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                user:
                  id: "a1b2c3d4-e89b-12d3-a456-426614174000"
                  username: "ivanov"
                  fullName: "Иванов Иван Иванович"
                  email: "ivanov@example.com"
                  department: "HR"
                  roles: ["EMPLOYEE"]
                  active: true
                expiresAt: "2026-05-11T15:23:45.000Z"
                _links:
                  self: { href: "/api/v1/auth/login" }
                  me: { href: "/api/v1/me" }
                  refresh: { href: "/api/v1/auth/refresh" }
                  logout: { href: "/api/v1/auth/logout" }
        '401':
          description: Authentication failed or password change is required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                authenticationFailed:
                  value:
                    type: "https://corp-rag.local/problems/authentication-failed"
                    title: "Authentication failed"
                    status: 401
                    errorCode: "AUTHENTICATION_FAILED"
                passwordChangeRequired:
                  value:
                    type: "https://corp-rag.local/problems/password-change-required"
                    title: "Password change required"
                    status: 401
                    errorCode: "PASSWORD_CHANGE_REQUIRED"
        '400':
          $ref: '#/components/responses/ValidationFailed'

  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Rotate refresh token and issue a new session cookie
      description: |
        Reads opaque refresh token cookie `corp_rag_refresh` at `Path=/api/v1/auth`,
        detects reuse, revokes the token family on reuse, and writes replacement
        `corp_rag_session` and `corp_rag_refresh` cookies. The access cookie path is
        `/api/v1`; the refresh cookie path is `/api/v1/auth`. Both are `HttpOnly`,
        `SameSite=Strict`, and `Secure` according to the active deployment profile.
      security:
        - refreshCookieAuth: []
      responses:
        '200':
          description: Session refreshed and refresh token rotated
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "corp_rag_session=eyJhbGc...; HttpOnly; Secure; SameSite=Strict; Path=/api/v1; Max-Age=900"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Refresh token is invalid, expired, revoked, or reused
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                invalid:
                  value:
                    type: "https://corp-rag.local/problems/refresh-token-invalid"
                    title: "Refresh token invalid"
                    status: 401
                    errorCode: "REFRESH_TOKEN_INVALID"
                reused:
                  value:
                    type: "https://corp-rag.local/problems/refresh-token-reused"
                    title: "Refresh token reused"
                    status: 401
                    errorCode: "REFRESH_TOKEN_REUSED"

  /auth/password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change current user's password
      description: |
        Changes the authenticated user's password. Used both for voluntary password
        change and mandatory first-login/reset flows when `mustChangePassword=true`.
        A successful change clears the mandatory-change flag and revokes existing
        refresh-token sessions except the current flow.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/PasswordPolicyViolation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Выйти и удалить session cookie
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session ended; session and refresh cookies cleared
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "corp_rag_session=; HttpOnly; Secure; SameSite=Strict; Path=/api/v1; Max-Age=0, corp_rag_refresh=; HttpOnly; Secure; SameSite=Strict; Path=/api/v1/auth; Max-Age=0"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Получить профиль текущего пользователя
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
              example:
                id: "a1b2c3d4-e89b-12d3-a456-426614174000"
                username: "ivanov"
                fullName: "Иванов Иван Иванович"
                email: "ivanov@example.com"
                department: "HR"
                roles: ["EMPLOYEE"]
                permissions: ["chat.query", "documents.read", "documents.upload"]
                active: true
                _links:
                  self: { href: "/api/v1/me" }
                  logout: { href: "/api/v1/auth/logout" }
                  conversations: { href: "/api/v1/chat/conversations" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===========================================================================
  # Users (admin)
  # ===========================================================================
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: Список пользователей
      x-required-permissions: ["users.read"]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
        - name: department
          in: query
          schema:
            $ref: '#/components/schemas/Department'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUsers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createUser
      tags: [users]
      summary: Создать пользователя
      x-required-permissions: ["users.create"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              username: "petrov"
              fullName: "Петров Пётр Петрович"
              email: "petrov@example.com"
              department: "IT"
              roles: ["EMPLOYEE"]
      responses:
        '201':
          description: User created; temporary password is returned exactly once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: getUser
      tags: [users]
      summary: Детали пользователя
      description: |
        A user may read their own profile. Reading another user requires
        `users.read`.
      x-required-permissions: ["users.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'
    patch:
      operationId: updateUser
      tags: [users]
      summary: Обновить пользователя
      description: |
        Users may update allowed self-service profile fields on their own account.
        Updating another user, changing active status, or changing administrative
        fields requires `users.update`. Self-deactivation and other protected
        self-modification attempts return `SELF_MODIFICATION_FORBIDDEN`.
      x-required-permissions: ["users.update"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Удалить пользователя (soft delete - active=false)
      x-required-permissions: ["users.delete"]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'

  /users/{userId}/reset-password:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password and return a one-time temporary password
      description: |
        Administrative password reset. The response contains the generated
        temporary password exactly once; it is never exposed on normal user DTOs.
        The target user is marked `mustChangePassword=true`.
      x-required-permissions: ["users.update"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Temporary password generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporaryPasswordResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'

  /users/{userId}/roles:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: assignUserRoles
      tags: [users, roles]
      summary: Назначить роли пользователю (replace-set)
      description: |
        Atomically replaces the user's full role set. The endpoint does not use
        ETag/If-Match. Assigning seeded `ADMIN` additionally requires
        `roles.update`; if the caller lacks it, return 403
        `INSUFFICIENT_PERMISSIONS` with details
        `{ "required_additional": "roles.update", "reason": "admin_grant" }`.
      x-required-permissions: ["users.update"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: ["EMPLOYEE", "MANAGER"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'
        '409':
          $ref: '#/components/responses/LastAdminProtected'

  # ===========================================================================
  # Roles (admin)
  # ===========================================================================
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: Список ролей
      x-required-permissions: ["roles.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
                  _links:
                    $ref: '#/components/schemas/HateoasLinks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createRole
      tags: [roles]
      summary: Создать роль
      x-required-permissions: ["roles.create"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
            example:
              name: "MANAGER"
              description: "Руководитель отдела"
              permissions: ["chat.query", "documents.read", "documents.upload", "users.read"]
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /roles/{roleId}:
    parameters:
      - $ref: '#/components/parameters/RoleIdPath'
    get:
      operationId: getRole
      tags: [roles]
      summary: Детали роли
      x-required-permissions: ["roles.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
                example: '"role-v3"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RoleNotFound'
    put:
      operationId: updateRole
      tags: [roles]
      summary: Replace a role
      description: |
        Full replacement update for custom roles. System roles cannot be updated.
        Requires `If-Match`; missing header returns 428, stale value returns 412,
        and success returns a new `ETag`. Custom roles may use only the seeded
        permission codes.
      x-required-permissions: ["roles.update"]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
                example: '"role-v4"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RoleNotFound'
        '409':
          $ref: '#/components/responses/SystemRoleProtected'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
    delete:
      operationId: deleteRole
      tags: [roles]
      summary: Удалить роль
      x-required-permissions: ["roles.delete"]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Удалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RoleNotFound'

  # ===========================================================================
  # Access Policies (admin)
  # ===========================================================================
  /access-policies:
    get:
      operationId: listAccessPolicies
      tags: [access-policies]
      summary: Список политик доступа
      x-required-permissions: ["access_policies.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessPolicy'
                  _links:
                    $ref: '#/components/schemas/HateoasLinks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createAccessPolicy
      tags: [access-policies]
      summary: Создать политику доступа
      description: |
        Политика связывает role с разрешёнными accessLevels, departments, docTypes.
        Из этой политики Java резолвит `AccessFilter` для каждого пользователя.
      x-required-permissions: ["access_policies.create"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessPolicyRequest'
            example:
              roleId: "r1234567-e89b-12d3-a456-426614174000"
              accessLevels: [PUBLIC, INTERNAL]
              departments: [HR, IT, FINANCE]
              docTypes: [POLICY, REGULATION, GUIDE]
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RoleNotFound'
        '409':
          $ref: '#/components/responses/RolePolicyAlreadyExists'

  /access-policies/{policyId}:
    parameters:
      - name: policyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getAccessPolicy
      tags: [access-policies]
      summary: Детали политики
      x-required-permissions: ["access_policies.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
                example: '"access-policy-v2"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/AccessPolicyNotFound'
    put:
      operationId: updateAccessPolicy
      tags: [access-policies]
      summary: Replace an access policy
      description: |
        Full replacement update. Requires `If-Match`; missing header returns 428,
        stale value returns 412, and success returns a new `ETag`. Mutations that
        would leave no user with full visibility return `LAST_ADMIN_VISIBILITY_LOST`.
      x-required-permissions: ["access_policies.update"]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccessPolicyRequest'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
                example: '"access-policy-v3"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/AccessPolicyNotFound'
        '409':
          $ref: '#/components/responses/LastAdminVisibilityLost'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
    delete:
      operationId: deleteAccessPolicy
      tags: [access-policies]
      summary: Удалить политику
      x-required-permissions: ["access_policies.delete"]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Удалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/AccessPolicyNotFound'

  # ===========================================================================
  # Documents
  # ===========================================================================
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: Список документов с фильтрами и пагинацией
      x-required-permissions: ["documents.read"]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DocumentStatus'
        - name: department
          in: query
          schema:
            $ref: '#/components/schemas/Department'
        - name: docType
          in: query
          schema:
            $ref: '#/components/schemas/DocType'
        - name: language
          in: query
          schema:
            $ref: '#/components/schemas/Language'
        - name: search
          in: query
          description: Текстовый поиск по title/filename.
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDocuments'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Загрузить документ
      description: |
        Загрузка файла + метаданные через `multipart/form-data`.
        Файл сохраняется в MinIO, метаданные в Postgres,
        событие `document.uploaded` публикуется в RabbitMQ (см. events-v1.yaml).
        Лимит размера: 50 МБ.
      x-required-permissions: ["documents.upload"]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title, accessLevel, department, docType, language]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, DOCX, HTML, MD, или TXT (до 50 МБ).
                title:
                  type: string
                  maxLength: 512
                  example: "Регламент отпусков 2026"
                accessLevel:
                  $ref: '#/components/schemas/AccessLevel'
                department:
                  $ref: '#/components/schemas/Department'
                docType:
                  $ref: '#/components/schemas/DocType'
                language:
                  $ref: '#/components/schemas/Language'
                description:
                  type: string
                  maxLength: 1000
      responses:
        '201':
          description: Документ создан, индексация начата асинхронно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
              example:
                id: "d8f3a1c2-e89b-12d3-a456-426614174000"
                title: "Регламент отпусков 2026"
                originalFilename: "Регламент отпусков 2026.pdf"
                mimeType: "application/pdf"
                sizeBytes: 248576
                accessLevel: "INTERNAL"
                department: "HR"
                docType: "POLICY"
                language: "ru"
                status: "UPLOADED"
                ownerUserId: "a1b2c3d4-e89b-12d3-a456-426614174000"
                uploadedAt: "2026-05-11T14:23:40.000Z"
                indexedAt: null
                chunkCount: null
                failureReason: null
                _links:
                  self: { href: "/api/v1/documents/d8f3a1c2-e89b-12d3-a456-426614174000" }
                  raw: { href: "/api/v1/documents/d8f3a1c2-e89b-12d3-a456-426614174000/raw" }
                  delete: { href: "/api/v1/documents/d8f3a1c2-e89b-12d3-a456-426614174000" }
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Файл слишком большой
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/DocumentIdPath'
    get:
      operationId: getDocument
      tags: [documents]
      summary: Детали документа
      x-required-permissions: ["documents.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/DocumentNotFound'
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Удалить документ
      description: |
        Soft delete документа. Публикует событие `document.deleted` — Python
        очистит индексы (Qdrant + Neo4j).
      x-required-permissions: ["documents.delete"]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Удалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/DocumentNotFound'
        '409':
          description: Документ в процессе индексации
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /documents/{documentId}/raw:
    parameters:
      - $ref: '#/components/parameters/DocumentIdPath'
    get:
      operationId: getDocumentRaw
      tags: [documents]
      summary: Получить presigned URL для скачивания файла
      description: |
        Возвращает временный URL к файлу в MinIO. URL действителен 5 минут.
        Frontend использует его для open-in-tab / download. Java не проксирует
        бинарные данные.
      x-required-permissions: ["documents.read"]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, expiresAt]
                properties:
                  url:
                    type: string
                    format: uri
                    example: "https://minio.local/corp-rag-documents/2026/05/d8f3a1c2.pdf?X-Amz-Algorithm=..."
                  expiresAt:
                    type: string
                    format: date-time
                    example: "2026-05-11T14:28:40.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/DocumentNotFound'

  # ===========================================================================
