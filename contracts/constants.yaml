# =============================================================================
# Corporate RAG System — Shared Contract Constants
# =============================================================================
#
# Source of truth for routing keys, queue names, exchange names, and error
# codes. Java and Python services generate symbolic constants from this file
# via scripts/generate_constants.py.
#
# DO NOT hand-write these values anywhere else in the codebase. If a constant
# is needed, add it here first, then regenerate.
#
# Naming conventions:
#   - YAML keys use snake_case (Python-friendly).
#   - Routing keys / queues / exchanges use dot.notation (AMQP convention).
#   - Error codes use UPPER_SNAKE_CASE (HTTP/RFC 7807 convention).
#
# Versioning:
#   - This file is locked at v1. Adding new constants is additive and allowed
#     without an ADR. Renaming or removing constants requires an ADR.
# =============================================================================

version: "1.0.0"

# -----------------------------------------------------------------------------
# Routing Keys (AMQP)
# -----------------------------------------------------------------------------
# Used as the routing_key when publishing to topic exchanges. Consumers bind
# their queues to these keys via the matching exchange.
#
# Java generated symbol:   com.corprag.contracts.constants.EventRoutingKeys.DOCUMENT_UPLOADED
# Python generated symbol: corp_rag_ai.contracts.generated.routing_keys.DOCUMENT_UPLOADED
# -----------------------------------------------------------------------------
routing_keys:
  document_uploaded: "document.uploaded"
  document_deleted: "document.deleted"
  document_indexed: "document.indexed"
  document_indexing_failed: "document.indexing.failed"

# -----------------------------------------------------------------------------
# Exchanges (AMQP)
# -----------------------------------------------------------------------------
# Topic exchanges for document lifecycle and the matching dead-letter exchange
# for failed deliveries.
#
# Java generated symbol:   com.corprag.contracts.constants.ExchangeNames.DOCUMENTS_TOPIC
# Python generated symbol: corp_rag_ai.contracts.generated.exchange_names.DOCUMENTS_TOPIC
# -----------------------------------------------------------------------------
exchanges:
  documents_topic: "corp-rag.documents"
  documents_dlx: "corp-rag.documents.dlx"

# -----------------------------------------------------------------------------
# Queues (AMQP)
# -----------------------------------------------------------------------------
# Direction conventions in queue names:
#   - "ai.*"      = consumed by the Python AI service
#   - "backend.*" = consumed by the Java Spring backend
#
# Every primary queue has a matching ".dlq" companion bound to the DLX. Failed
# messages (after retries) end up in the .dlq for manual inspection.
#
# Java generated symbol:   com.corprag.contracts.constants.QueueNames.AI_DOCUMENT_UPLOADED
# Python generated symbol: corp_rag_ai.contracts.generated.queue_names.AI_DOCUMENT_UPLOADED
# -----------------------------------------------------------------------------
queues:
  # Java publishes → Python consumes
  ai_document_uploaded: "ai.document.uploaded"
  ai_document_uploaded_dlq: "ai.document.uploaded.dlq"
  ai_document_deleted: "ai.document.deleted"
  ai_document_deleted_dlq: "ai.document.deleted.dlq"

  # Python publishes → Java consumes
  backend_document_indexed: "backend.document.indexed"
  backend_document_indexed_dlq: "backend.document.indexed.dlq"
  backend_document_failed: "backend.document.failed"
  backend_document_failed_dlq: "backend.document.failed.dlq"

# -----------------------------------------------------------------------------
# Error Codes (RFC 7807 Problem Details)
# -----------------------------------------------------------------------------
# Each error code maps to:
#   - http_status   : HTTP status code returned by the API.
#   - problem_type  : URI used in ProblemDetail.type field (machine-readable).
#   - default_title : human-readable title used in ProblemDetail.title.
#
# The problem_type URIs use the placeholder host "corp-rag.local". In production
# this should be replaced with the actual operator domain. The path identifies
# the error class.
#
# Java generated symbol:   com.corprag.contracts.constants.ErrorCodes.DOCUMENT_NOT_FOUND
# Python generated symbol: corp_rag_ai.contracts.generated.error_codes.DOCUMENT_NOT_FOUND
# -----------------------------------------------------------------------------
error_codes:
