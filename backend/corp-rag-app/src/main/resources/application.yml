server:
  port: 8080

spring:
  application:
    name: corp-rag-backend
  datasource:
    url: ${JAVA_DB_URL:jdbc:postgresql://localhost:5432/corp_rag_java}
    username: ${JAVA_DB_USER:corp_rag_java}
    password: ${JAVA_DB_PASSWORD:corp_rag_java_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  first-admin:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    username: ${ADMIN_USERNAME:}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:corp-rag}
      access-token-minutes: 15
    cookies:
      secure: ${COOKIES_SECURE:false}
    cors:
      allowed-origins:
        - http://localhost
        - http://localhost:80
        - http://localhost:8080
        - http://127.0.0.1
        - http://127.0.0.1:8080
    sessions:
      max-active: ${MAX_ACTIVE_SESSIONS_PER_USER:5}
      refresh-token-days: 7
  document-storage:
    endpoint: ${JAVA_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${JAVA_MINIO_ACCESS_KEY:local-minio-root}
    secret-key: ${JAVA_MINIO_SECRET_KEY:local-minio-password}
    secure: ${JAVA_MINIO_SECURE:false}
    bucket: ${JAVA_MINIO_BUCKET:corp-rag-documents}
    raw-url-ttl: ${JAVA_MINIO_RAW_URL_TTL:5m}
    initialize-bucket: ${JAVA_MINIO_INITIALIZE_BUCKET:false}
